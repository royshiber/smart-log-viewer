# Render Blueprint — https://render.com
# אחרי "Apply" תקבל URL ציבורי. בחר Free instance ביצירת השירות אם תרצה.

services:
  - type: web
    name: smart-log-viewer
    runtime: node
    # Install must include client devDependencies (Vite) — Render sets NODE_ENV=production.
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
