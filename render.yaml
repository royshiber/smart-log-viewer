# Render Blueprint — https://render.com
# אחרי "Apply" תקבל URL ציבורי. בחר Free instance ביצירת השירות אם תרצה.

services:
  - type: web
    name: smart-log-viewer
    runtime: node
    buildCommand: npm ci --prefix client && npm ci --prefix server && npm run build --prefix client
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
